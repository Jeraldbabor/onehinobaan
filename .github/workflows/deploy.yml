name: Deploy to DigitalOcean

on:
  push:
    branches:
      - final # Change to 'main' or whatever your production branch is

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Navigate to the application directory (Update with your actual path)
            cd /var/www/onehinobaan
            
            # Put the application in maintenance mode
            php artisan down || true
            
            # Pull down the latest changes
            git pull origin final
            
            # Install/update PHP dependencies
            composer install --no-interaction --prefer-dist --optimize-autoloader
            
            # Install Node dependencies and build assets
            npm ci
            npm run build
            
            # Clear and cache configurations/routes/views
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Run database migrations
            php artisan migrate --force
            
            # Ensure storage is linked
            php artisan storage:link
            
            # Take application out of maintenance mode
            php artisan up
            
            # Reload PHP-FPM/Supervisor if necessary (Uncomment if needed)
            # sudo systemctl reload php8.2-fpm
            # sudo supervisorctl restart all
